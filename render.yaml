services:
  - type: web
    name: hummix-sales-os
    env: node
    region: singapore  # closest to Thailand
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    healthCheckPath: /
    autoDeploy: true
